<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside Out Interactive Icons</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .bg-layer-default {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("Img/BG\ 4th.png");
            background-size: cover; background-position: center;
            z-index: 1;
        }

        .bg-emotion {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: 2;
            opacity: 0;
            will-change: opacity;
            transition: opacity 0.4s ease-out;
            pointer-events: none;
        }

        .bg-emotion.active { opacity: 1; }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 230px);
            gap: 40px; 
            z-index: 10;
            position: relative;
        }

        .icon-box {
            position: relative; 
            width: 230px; height: 230px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .icon-box:hover { transform: scale(1.12); }

        .icon-box img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease, filter 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .icon-box:hover .img-hover {
            opacity: 1;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9));
        }

        .img-hover { opacity: 0; }
        .icon-box:hover .img-base { opacity: 0; }
    </style>
</head>
<body>

    <div class="bg-layer-default"></div>

    <div class="bg-emotion" id="bg-joy" style="background-image: url('Img/Joy\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-sadness" style="background-image: url('Img/Sadness\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-anger" style="background-image: url('Img/Anger\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-disgust" style="background-image: url('Img/Disgust\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-fear" style="background-image: url('Img/Fear\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-anxiety" style="background-image: url('Img/Anxiety\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-envy" style="background-image: url('Img/Envy\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-ennui" style="background-image: url('Img/Ennui\ BG_.png');"></div>
    <div class="bg-emotion" id="bg-embar" style="background-image: url('Img/Embarrassment\ BG_.png');"></div>

    <div class="container">
        <div class="icon-box" onmouseenter="showBG('bg-joy'); playSound('audio-1')" onmouseleave="hideBG('bg-joy'); stopSound('audio-1')">
            <img src="Img/Joy_Inactive.png" class="img-base">
            <img src="Img/Joy_Active.png" class="img-hover">
            <audio id="audio-1" src="Sound/Joy Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-sadness'); playSound('audio-2')" onmouseleave="hideBG('bg-sadness'); stopSound('audio-2')">
            <img src="Img/Sadness_Inactive.png" class="img-base">
            <img src="Img/Sadness_Active.png" class="img-hover">
            <audio id="audio-2" src="Sound/Sadness Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-anger'); playSound('audio-3')" onmouseleave="hideBG('bg-anger'); stopSound('audio-3')">
            <img src="Img/Anger_Inactive.png" class="img-base">
            <img src="Img/Anger_Active.png" class="img-hover">
            <audio id="audio-3" src="Sound/Anger Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-disgust'); playSound('audio-4')" onmouseleave="hideBG('bg-disgust'); stopSound('audio-4')">
            <img src="Img/Disgust_Inactive.png" class="img-base">
            <img src="Img/Disgust_Active.png" class="img-hover">
            <audio id="audio-4" src="Sound/Disgust Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-fear'); playSound('audio-5')" onmouseleave="hideBG('bg-fear'); stopSound('audio-5')">
            <img src="Img/Fear_Inactive.png" class="img-base">
            <img src="Img/Fear_Active.png" class="img-hover">
            <audio id="audio-5" src="Sound/Fear Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-anxiety'); playSound('audio-6')" onmouseleave="hideBG('bg-anxiety'); stopSound('audio-6')">
            <img src="Img/Anxiety_Inactive.png" class="img-base">
            <img src="Img/Anxiety_Active.png" class="img-hover">
            <audio id="audio-6" src="Sound/Anxiety Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-envy'); playSound('audio-7')" onmouseleave="hideBG('bg-envy'); stopSound('audio-7')">
            <img src="Img/Envy_Inactive.png" class="img-base">
            <img src="Img/Envy_Active.png" class="img-hover">
            <audio id="audio-7" src="Sound/Envy Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-ennui'); playSound('audio-8')" onmouseleave="hideBG('bg-ennui'); stopSound('audio-8')">
            <img src="Img/Ennui_Inactive.png" class="img-base">
            <img src="Img/Ennui_Active.png" class="img-hover">
            <audio id="audio-8" src="Sound/Ennui Sound.mp3"></audio>
        </div>
        <div class="icon-box" onmouseenter="showBG('bg-embar'); playSound('audio-9')" onmouseleave="hideBG('bg-embar'); stopSound('audio-9')">
            <img src="Img/Embarrassment_Inactive.png" class="img-base">
            <img src="Img/Embarrassment_Active.png" class="img-hover">
            <audio id="audio-9" src="Sound/Embarrassment Sound.mp3"></audio>
        </div>
    </div>

    <script>
        function showBG(id) {
            const el = document.getElementById(id);
            if(el) el.classList.add('active');
        }
        function hideBG(id) {
            const el = document.getElementById(id);
            if(el) el.classList.remove('active');
        }
        function playSound(id) {
            const audio = document.getElementById(id);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
        }
        function stopSound(id) {
            const audio = document.getElementById(id);
            if (audio) audio.pause();
        }
    </script>
</body>
</html>
